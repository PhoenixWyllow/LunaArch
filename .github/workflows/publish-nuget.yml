name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Version suffix (e.g., beta1, preview.1)'
        required: false
        default: 'beta1'

# Minimal default permissions for all jobs
permissions:
  contents: read

env:
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      suffix: ${{ steps.version.outputs.suffix }}
    steps:
      - name: Determine version suffix
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            if [[ "$TAG" == *"-"* ]]; then
              SUFFIX="${TAG#*-}"
            else
              SUFFIX=""
            fi
          else
            SUFFIX="${{ github.event.inputs.version_suffix }}"
          fi
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT

  build-and-test:
    needs: determine-version
    uses: ./.github/workflows/build-and-test.yml
    permissions:
      contents: read
      checks: write
    with:
      pack: true
      version-suffix: ${{ needs.determine-version.outputs.suffix }}

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required for actions/checkout (global.json)
      id-token: write  # Required for OIDC trusted publishing
    environment: nuget
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: global.json
          sparse-checkout-cone-mode: false

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: nuget-packages
          path: ./nupkgs

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
    
      - name: Push to NuGet (Trusted Publishing)
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{steps.login.outputs.NUGET_API_KEY}} \
            --skip-duplicate